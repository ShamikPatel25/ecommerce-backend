# ─── Redirect HTTP → HTTPS ────────────────────────────────────────────
server {
    listen 80;
    server_name myplatform.com *.myplatform.com;

    # Let's Encrypt challenge (certbot needs this)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Everything else → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ─── API Backend (api.myplatform.com) ─────────────────────────────────
server {
    listen 443 ssl;
    server_name api.myplatform.com;

    ssl_certificate     /etc/letsencrypt/live/myplatform.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myplatform.com/privkey.pem;

    client_max_body_size 10M;

    # Static files (admin CSS/JS)
    location /static/ {
        alias /app/staticfiles/;
    }

    # Media files (product images)
    location /media/ {
        alias /app/mediafiles/;
    }

    # WebSocket connections (notifications)
    location /ws/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # API requests → Django/Daphne backend
    location / {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ─── Frontend: main domain + all store subdomains ─────────────────────
# nike.myplatform.com, adidas.myplatform.com, myplatform.com → all go to Next.js
server {
    listen 443 ssl;
    server_name myplatform.com *.myplatform.com;

    ssl_certificate     /etc/letsencrypt/live/myplatform.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/myplatform.com/privkey.pem;

    # Media files (so product images load on storefront too)
    location /media/ {
        alias /app/mediafiles/;
    }

    # Everything else → Next.js frontend
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
