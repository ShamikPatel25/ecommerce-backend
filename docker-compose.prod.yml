services:
  postgres:
    image: postgres:18-alpine
    container_name: ecommerce_db
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    networks:
      - ecommerce_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ecommerce_backend
    environment:
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: 'False'
      ALLOWED_HOSTS: ${DOMAIN},api.${DOMAIN},.${DOMAIN},backend
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: postgres
      DB_PORT: 5432
      JWT_ACCESS_TOKEN_LIFETIME: 60
      JWT_REFRESH_TOKEN_LIFETIME: 1440
      FRONTEND_URL: https://${DOMAIN}
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: https://${DOMAIN},https://api.${DOMAIN}
      EMAIL_BACKEND: django.core.mail.backends.smtp.EmailBackend
      EMAIL_HOST: ${EMAIL_HOST}
      EMAIL_PORT: ${EMAIL_PORT}
      EMAIL_HOST_USER: ${EMAIL_HOST_USER}
      EMAIL_HOST_PASSWORD: ${EMAIL_HOST_PASSWORD}
    volumes:
      - media_data:/app/mediafiles
      - static_data:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce_network
    restart: always

  frontend:
    build:
      context: ../ecommerce-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN}/api
    container_name: ecommerce_frontend
    environment:
      NEXT_PUBLIC_API_URL: https://api.${DOMAIN}/api
      BACKEND_INTERNAL_URL: http://backend:8000
    depends_on:
      - backend
    networks:
      - ecommerce_network
    restart: always

  nginx:
    image: nginx:alpine
    container_name: ecommerce_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/www:/var/www/certbot:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - media_data:/app/mediafiles:ro
      - static_data:/app/staticfiles:ro
    depends_on:
      - backend
      - frontend
    networks:
      - ecommerce_network
    restart: always

  # Certbot for auto-renewing SSL certificates
  certbot:
    image: certbot/certbot
    container_name: ecommerce_certbot
    volumes:
      - ./certbot/www:/var/www/certbot
      - ./certbot/conf:/etc/letsencrypt
    # Renew certificates every 12 hours
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - ecommerce_network

networks:
  ecommerce_network:
    driver: bridge

volumes:
  postgres_data:
  media_data:
  static_data:
