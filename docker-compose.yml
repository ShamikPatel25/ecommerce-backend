version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce_db
    environment:
      POSTGRES_DB: ecommerce_multitenancy
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Shamik@2225
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: